<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ITシラバス6.5 クイズ（ID自動割当版）</title>
    <style>
        /* スタイル部分は変更なし */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #login-screen { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        #game-container, #review-container { display: none; max-width: 700px; width: 100%; }
        #game-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; color: #666; }
        .logout-btn { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .scoreboard { display: flex; justify-content: space-around; background: #343a40; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .score-val { display: block; font-size: 1.2rem; color: #ffc107; text-align: center; }
        .question-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .question-box { font-size: 1.25rem; font-weight: bold; line-height: 1.6; flex-grow: 1; color: #333; }
        .check-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #ccc; transition: 0.2s; padding: 0 0 0 10px; }
        .check-btn.active { color: #ffc107; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; background: none; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .choice-btn:hover:not(:disabled) { background: #f8f9fa; border-color: #007bff; }
        #feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; }
        .correct-ui { background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
        .incorrect-ui { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
        .btn-next { margin-top: 20px; width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        #review-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .review-item { border-bottom: 1px solid #eee; padding: 12px; cursor: pointer; border-radius: 5px; }
        .review-item:hover { background: #eef6ff; }
        .scroll-area { max-height: 400px; overflow-y: auto; }
        input[type="text"] { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        .btn-login { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>ITクイズへようこそ</h2>
    <p>名前を入力してください</p>
    <input type="text" id="username-input" placeholder="ユーザー名">
    <br>
    <button class="btn-login" onclick="login()">開始する</button>
</div>

<div id="game-container">
    <div class="user-info">
        <span>ユーザー: <strong id="display-name"></strong></span>
        <button class="logout-btn" onclick="logout()">別の名前で入る</button>
    </div>
    
    <div class="scoreboard">
        <div class="score-item">解いた数<span id="total-count" class="score-val">0</span></div>
        <div class="score-item">正解数<span id="correct-count" class="score-val">0</span></div>
        <div class="score-item">正答率<span id="accuracy" class="score-val">0%</span></div>
    </div>

    <div id="quiz-area">
        <div class="question-header">
            <div class="question-box" id="q-text">問題を表示中...</div>
            <button id="star-btn" class="check-btn" onclick="toggleCheck()">★</button>
        </div>
        <div id="choices-container"></div>
        <div id="feedback">
            <strong id="result-label"></strong><br>
            <span id="explanation-text"></span>
        </div>
        <button id="next-btn" class="btn-next" style="display:none;" onclick="loadQuestion()">次のランダム問題へ</button>
    </div>
</div>

<div id="review-container">
    <h3>📌 <span id="list-owner"></span>さんの確認リスト</h3>
    <div class="scroll-area" id="review-list-container">
        <div id="review-list">チェックした問題はありません。</div>
    </div>
</div>


<script>
// 不正解の選択肢（distractors）を固定で持つ形式に変更
const rawData = [
  {
    "q": "企業経営の中核となる方向性を示すものをアルファベット3文字で何というか。",
    "a": "MVV（Mission Vision Value）",
    "d": ["KPI", "OKR", "BCP"],
    "ex": "Missionは企業が果たすべき使命や理念、Visionは企業が目指す将来の理想像、ValueはMissionやVisionを実現するための具体的な行動指針を定義します。"
  },
  {
    "q": "自社が社会的に何のために存在するのか、どのような社会貢献の役割を担うかといったことを定義し、それに基づいた経営を何経営というか。",
    "a": "パーパス経営",
    "d": ["CSR経営", "ESG経営", "サステナブル経営"],
    "ex": "パーパスは直訳すると「目的」や「意図」という意味ですが、ビジネスでは「企業の存在意義」を示す言葉として使われています。"
  },
  {
    "q": "人材が持つ知識や能力などを、投資して価値を高めることができる資本として捉えることを何資本というか。",
    "a": "人的資本",
    "d": ["知的資本", "社会関係資本", "労働資本"],
    "ex": "人的資本の価値を最大限に引き出し、企業の価値向上につなげる経営のあり方を「人的資本経営」と呼びます。"
  },
  {
    "q": "商品やサービスのライフサイクルで排出された温室効果ガスの総量を二酸化炭素量に換算し、商品などに表示することを何というか。",
    "a": "カーボンフットプリント",
    "d": ["カーボンオフセット", "カーボンニュートラル", "カーボンクレジット"],
    "ex": "原材料調達から廃棄・リサイクルに至るまでの全過程で排出される温室効果ガスを、目に見えない「足跡（フットプリント）」のように追跡する概念です。"
  },
  {
    "q": "新しい職業に就くためや、今の職業で必要とされるスキルの大幅な変化に適応するために、新しいスキルを習得することを何というか。",
    "a": "リスキリング",
    "d": ["リカレント教育", "スキルアップ", "アンラーニング"],
    "ex": "技術革新やビジネスモデルの変化に対応するために、学び直しを行うことを指します。"
  },
  {
    "q": "多様な人々の誰もが公平な機会を得られ、能力を発揮できる環境を実現するという考え方を何というか。",
    "a": "DEI（ディー・イー・アイ）",
    "d": ["D&I", "CSR", "SDG"],
    "ex": "ダイバーシティ（多様性）、エクイティ（公平性）、インクルージョン（包括性）の3つの頭文字を合わせた用語です。"
  },
  {
    "q": "全ての状況に適用できる唯一最適なリーダーシップのスタイルは存在せず、環境により望ましいリーダーシップのスタイルは異なるとする理論を何というか。",
    "a": "コンティンジェンシー理論",
    "d": ["行動理論", "特性理論", "PM理論"],
    "ex": "「偶然性」や「不確実性」を意味する英語に由来し、状況適応型リーダーシップとも呼ばれます。"
  },
  {
    "q": "特定の1人がリーダーになるのではなく、チームのメンバー全員がリーダーとしての役割を担い、主導権を発揮することを何というか。",
    "a": "シェアードリーダーシップ",
    "d": ["セルフリーダーシップ", "チームリーダーシップ", "オーセンティックリーダーシップ"],
    "ex": "共有・分担を意味する「シェアード」と「リーダーシップ」を組み合わせた造語です。"
  },
  {
    "q": "相手の話をよく聞き、奉仕することで成長を支援することを何リーダーシップというか。",
    "a": "サーバントリーダーシップ",
    "d": ["コーチングリーダーシップ", "トランスフォーメーショナルリーダーシップ", "指導型リーダーシップ"],
    "ex": "まず相手に奉仕し、その後に相手を導くという、リーダーがフォロワーを支えるスタイルです。"
  },
  {
    "q": "観光地やリゾート地、帰省先などで休暇を取りながらテレワークを利用して仕事をする働き方を何というか。",
    "a": "ワーケーション",
    "d": ["ノマドワーク", "ブレジャー", "ステイケーション"],
    "ex": "「ワーク（仕事）」と「バケーション（休暇）」を組み合わせた造語です。"
  },
  {
    "q": "化石燃料をできるだけ使わず、太陽光や風力、水素などのクリーンなエネルギーを活用していくための改革や、その実現に向けた活動を何というか。",
    "a": "GX（グリーントランスフォーメーション）",
    "d": ["DX", "EX", "SX"],
    "ex": "脱炭素社会の実現を目指し、経済社会システム全体を変革させる取り組みのことです。"
  },
  {
    "q": "GXにおける取り組みの1つで、温室効果ガスの排出量を森林の吸収量や技術によって除去した量を差し引き、全体としてゼロになっている状態を何というか。",
    "a": "カーボンニュートラル",
    "d": ["カーボンゼロ", "カーボンフリー", "ネットゼロ排出"],
    "ex": "カーボン（炭素）をニュートラル（中立）にするという意味で、日本は2050年までの達成を目標としています。"
  },
  {
    "q": "統計分野において、同じ条件で繰り返し測定を行った時に、その測定値がどれだけ互いに近いかを示す指標を何というか。",
    "a": "精度",
    "d": ["正確度", "妥当性", "再現性"],
    "ex": "測定値のバラツキの小ささを表します。また、真の値からの誤差は「偏り」と呼ばれます。"
  },
  {
    "q": "母集団から標本を抽出した際、偶然ではなく標本に偏りが発生することがあるが、この偏りを何というか。",
    "a": "統計的バイアス",
    "d": ["統計的エラー", "標本誤差", "サンプリングノイズ"],
    "ex": "バイアスとは「偏り」を意味し、これによって統計結果が実態と異なるものになる可能性があります。"
  },
  {
    "q": "統計的バイアスのうち、標本（対象者）を選ぶ際の偏りを何というか。",
    "a": "選択バイアス",
    "d": ["抽出バイアス", "回収バイアス", "応答バイアス"],
    "ex": "例えば、インターネットの利用率をインターネット調査で調べると、利用率が極端に高く出てしまうといったケースが該当します。"
  },
  {
    "q": "統計的バイアスのうち、情報を得る時に生じる偏りを何というか。",
    "a": "情報バイアス",
    "d": ["測定バイアス", "観察者バイアス", "想起バイアス"],
    "ex": "例えば、回答者が年齢を偽るなど、正しい情報が入力・収集されないことで生じる偏りです。"
  },
  {
    "q": "自分の経験や思い込みによって、合理性や一貫性に欠けた判断をしてしまうことを何バイアスというか。",
    "a": "認知バイアス",
    "d": ["確証バイアス", "正常性バイアス", "後知恵バイアス"],
    "ex": "思い込みが激しすぎると、都合の悪いデータを「間違い」だと勝手に判断してしまう危険性があります。"
  },
  {
    "q": "2023年10月から開始された、消費税の仕入れ税額控除の方式を定めたものを何というか。",
    "a": "インボイス制度（適格請求書等保存方式）",
    "d": ["電子帳簿保存法", "軽減税率制度", "e-Tax制度"],
    "ex": "売り手は買い手に正確な税額を伝えるためのインボイスを発行し、双方が保存することで税額控除が適用されます。"
  },
  {
    "q": "一定の要件のもと、インターネット上に残っている個人に関する情報を削除することや、検索結果に表示されなくすることを求める権利を何というか。",
    "a": "忘れられる権利（消去権）",
    "d": ["知る権利", "プライバシー権", "肖像権"],
    "ex": "ただし、情報が広く拡散されすぎている場合、現実的に完全な消去が難しいケースもあります。"
  },
  {
    "q": "職場における労働者の安全と健康を確保するとともに、快適な職場環境の形成を目的とする法律を何というか。",
    "a": "労働安全衛生法",
    "d": ["労働基準法", "労働組合法", "労働契約法"],
    "ex": "健康診断やストレスチェックの実施、安全衛生教育など、様々なルールが定められています。"
  },
  {
    "q": "労働者が能力を有効に発揮できるようにし、職業の安定と経済的・社会的地位の向上を図ることを目的とする法律を何というか。",
    "a": "労働施策総合推進法（パワハラ防止法）",
    "d": ["男女雇用機会均等法", "育児・介護休業法", "労働者派遣法"],
    "ex": "パワーハラスメントの防止措置が義務付けられたことから、パワハラ防止法とも呼ばれています。"
  },
  {
    "q": "労働者に法定労働時間を超えて時間外労働をさせる場合に結ぶ労使協定を何というか。",
    "a": "36（サブロク）協定",
    "d": ["24協定", "32協定", "40協定"],
    "ex": "労働基準法36条に基づいています。これがない状態で残業をさせることは法律違反となります。"
  },
  {
    "q": "消費者の利益を守るため、不当な表示の禁止や景品類の制限・禁止を定めた法律を何というか。",
    "a": "景品表示法",
    "d": ["消費者保護法", "特商法", "独占禁止法"],
    "ex": "消費者が誤認するような過大な表示を規制し、高額すぎる景品提供を防ぐためのルールです。"
  },
  {
    "q": "SNSで自分と似た興味関心を持つユーザーと繋がることで、自分と同意見の情報だけが増幅して届き、閉じこもっている状況を何というか。",
    "a": "エコーチェンバー",
    "d": ["フィルターバブル", "サイバーカスケード", "情報の非対称性"],
    "ex": "周囲が同意ばかりの環境になると、客観的な視点を失い、誤った情報を正しいと思い込む危険があります。"
  },
  {
    "q": "利用者の個人情報や閲覧履歴によって、利用者に興味がありそうな情報ばかりが表示され、それ以外の情報に接する機会が失われている状況を何というか。",
    "a": "フィルターバブル",
    "d": ["エコーチェンバー", "アルゴリズム・バイアス", "情報格差"],
    "ex": "見たい情報に包まれることで価値観が狭まったり、考え方が偏ったりする危険性が指摘されています。"
  },
  {
    "q": "SNSやブログなどで公開された情報が一度拡散してしまうと、完全に消すことが困難でインターネット上に残り続けてしまうことを何というか。",
    "a": "デジタルタトゥー",
    "d": ["デジタル・スタンプ", "インターネット・アーカイブ", "デジタル・フットプリント"],
    "ex": "刺青（タトゥー）のように一度刻むと消えないことから来た造語で、忘れられる権利の行使を難しくさせる要因です。"
  },
  {
    "q": "廃棄物の排出の抑制や処理について定めた法律を何というか。",
    "a": "廃棄物処理法",
    "d": ["リサイクル法", "環境基本法", "資源有効利用促進法"],
    "ex": "廃棄物の適正な保管、収集、運搬、再生、処分に関するルールや罰則が規定されています。"
  },
  {
    "q": "企業などが排出する二酸化炭素に価格をつけて、金銭的な負担を課すことを何というか。",
    "a": "カーボンプライシング",
    "d": ["炭素税", "排出権取引", "環境税"],
    "ex": "排出削減が企業の利益に直結するようにすることで、脱炭素を促進させる仕組みです。"
  },
  {
    "q": "カーボンプライシングの導入など、GXの実現に向けた取り組みや方針などを示した法律を何というか。",
    "a": "GX推進法",
    "d": ["脱炭素社会推進法", "地球温暖化対策推進法", "省エネ法"],
    "ex": "GX推進戦略の策定や、GX経済移行債の発行、推進機構の設立などが規定されています。"
  },
  {
    "q": "多くの人が利用することで、事実上の世界標準と見なされるようになった規格や製品を何というか。",
    "a": "デファクトスタンダード",
    "d": ["デジュレスタンダード", "フォーラムスタンダード", "国際標準"],
    "ex": "WindowsやMS Office、キーボードのQWERTY配列などが代表例です。"
  },
  {
    "q": "デファクトスタンダードに対して、国際機関や標準化団体によって制定されたものを何というか。",

    "ex": "ISO（国際標準化機構）やJIS（日本産業規格）などが制定する、公的な手続きを経て定められた規格のことです。"

  {
    "q": "人的資本の情報開示に関する ISO（国際規格）を何というか。",
    "a": "ISO 30414",
    "d": ["ISO 9001", "ISO 14001", "ISO 27001"],
    "ex": "社内外のステークホルダーに向けて人的資本への取り組みを情報開示するためのガイドラインで、具体的な指標が示されています。"
  },
  {
    "q": "リスクを組織的に管理し、リスクの発生による損害の回避や低減を図る取り組みを何というか。",

    "d": ["リスクヘッジ", "クライシスマネジメント", "コンプライアンス"],
    "ex": "マイナスの影響を抑えるだけでなく、リスクを「機会」として前向きに捉える考え方もあります。"
  },
  {
    "q": "リスクマネジメントに関する JIS（日本産業規格）を何というか。",
    "a": "JIS Q 31000",
    "d": ["JIS Q 9001", "JIS Q 14001", "JIS Q 27001"],
    "ex": "あらゆる業種・規模の組織において、リスクに対する最適な対応を行うための指針を示すものです。"
  },
  {
    "q": "顧客が商品やサービスを知って興味を持った段階から、購入、アフターフォローまでを通じて得る体験を何というか。",
    "a": "CX（カスタマーエクスペリエンス）",
    "d": ["CS", "UX", "DX"],
    "ex": "製品の質だけでなく、サポートなど全体を通した「顧客体験」の重要性を表す言葉です。"
  },
  {
    "q": "サービスを知ってから購入、使用に至る道筋を何というか。",
    "a": "カスタマージャーニーマップ",
    "d": ["ユーザーストーリーマップ", "バリューチェーンマップ", "サービスブループリント"],
    "ex": "ペルソナ（人物像）を設定し、時系列ごとの行動や心理を可視化した図のことです。"
  },
  {

// 省略: 既存のログイン・ログアウト等の処理は同じ

function setQuiz(questionObj) {
    currentQuestion = questionObj;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('star-btn').classList.toggle('active', checkedIds.includes(currentQuestion.id));

    // 以前の「他からランダム抽出」ではなく、定義された「d」を使用する
    const distractors = currentQuestion.d || [];
    const choices = [currentQuestion.a, ...distractors].sort(() => 0.5 - Math.random());
    
    document.getElementById('q-text').innerText = currentQuestion.q;
    const container = document.getElementById('choices-container');
    container.innerHTML = "";
    
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice;
        btn.onclick = () => checkAnswer(choice, currentQuestion.a, currentQuestion.ex);
        container.appendChild(btn);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
